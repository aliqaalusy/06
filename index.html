<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Render Multi View</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    padding: 20px;
}

/* TAB */
.tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 20px;
}

.tab-btn {
    padding: 10px 15px;
    border: none;
    background: #ddd;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
}

.tab-btn.active {
    background: #4facfe;
    color: white;
}

/* CONTENT */
.content {
    background: white;
    padding: 20px;
    border-radius: 0 10px 10px 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.hidden { display: none; }

/* MENU LIST */
.menu-list {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.menu-item {
    background: #4facfe;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #4facfe;
    color: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
}

/* CARD */
.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
}

.card {
    background: #fafafa;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* ARRAY */
pre {
    background: black;
    color: lime;
    padding: 10px;
}
</style>
</head>

<body>

<h1>Render Data Lengkap</h1>

<!-- TAB MENU -->
<div class="tabs">
    <button class="tab-btn" onclick="UI.show('array', this)">Array</button>
    <button class="tab-btn" onclick="UI.show('menu', this)">Menu</button>
    <button class="tab-btn" onclick="UI.show('table', this)">Table</button>
    <button class="tab-btn" onclick="UI.show('card', this)">Card</button>
    <button class="tab-btn" onclick="UI.show('list', this)">List</button>
</div>

<div class="content">

<!-- ARRAY -->
<div id="array-view">
    <h3>Array</h3>
    <pre id="array"></pre>
</div>

<!-- MENU -->
<div id="menu-view" class="hidden">
    <h3>Menu</h3>
    <div id="menu" class="menu-list"></div>
</div>

<!-- TABLE -->
<div id="table-view" class="hidden">
    <h3>Table</h3>
    <table>
        <thead>
            <tr><th>ID</th><th>Nama</th></tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

<!-- CARD -->
<div id="card-view" class="hidden">
    <h3>Card</h3>
    <div id="card" class="card-container"></div>
</div>

<!-- LIST -->
<div id="list-view" class="hidden">
    <h3>List</h3>
    <ul id="list"></ul>
</div>

</div>

<script>
/* DATA */
const data = [
    { id: 1, nama: "satu" },
    { id: 2, nama: "dua" },
    { id: 3, nama: "tiga" },
    { id: 4, nama: "empat" },
    { id: 5, nama: "lima" },
    { id: 6, nama: "enam" }
];

/* RENDERER */
const Renderer = {

    array(data) {
        document.getElementById("array").textContent =
            JSON.stringify(data, null, 2);
    },

    menu(data) {
        const el = document.getElementById("menu");
        el.innerHTML = "";
        data.forEach(i => {
            el.innerHTML += `<div class="menu-item">${i.nama}</div>`;
        });
    },

    table(data) {
        const el = document.getElementById("table");
        el.innerHTML = "";
        data.forEach(i => {
            el.innerHTML += `<tr><td>${i.id}</td><td>${i.nama}</td></tr>`;
        });
    },

    card(data) {
        const el = document.getElementById("card");
        el.innerHTML = "";
        data.forEach(i => {
            el.innerHTML += `
                <div class="card">
                    <b>${i.nama}</b><br>
                    ID: ${i.id}
                </div>`;
        });
    },

    list(data) {
        const el = document.getElementById("list");
        el.innerHTML = "";
        data.forEach(i => {
            el.innerHTML += `<li>${i.id} - ${i.nama}</li>`;
        });
    }
};

/* UI */
const UI = {
    show(view, btn) {

        ["array","menu","table","card","list"].forEach(v => {
            document.getElementById(v+"-view").classList.add("hidden");
        });

        document.getElementById(view+"-view").classList.remove("hidden");

        document.querySelectorAll(".tab-btn")
            .forEach(b => b.classList.remove("active"));

        btn.classList.add("active");
    }
};

/* INIT */
Renderer.array(data);
Renderer.menu(data);
Renderer.table(data);
Renderer.card(data);
Renderer.list(data);

document.querySelector(".tab-btn").click();
</script>

</body>
</html>
